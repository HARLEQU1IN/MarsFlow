name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;30.0.14904198"
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build apk --release --target-platform android-arm64
      - run: cp build/app/outputs/flutter-apk/app-release.apk MarsFlow-android-release.apk
      - uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: MarsFlow-android-release.apk

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build web --release
      - run: cd build/web && zip -r ../../MarsFlow-web.zip .
      - uses: actions/upload-artifact@v5
        with:
          name: web-zip
          path: MarsFlow-web.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build macos --release
      - run: cd build/macos/Build/Products/Release && zip -r ../../../../../MarsFlow-macos-app.zip mars_flow.app
      - uses: actions/upload-artifact@v5
        with:
          name: macos-zip
          path: MarsFlow-macos-app.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build windows --release
      - shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath MarsFlow-windows.zip
      - uses: actions/upload-artifact@v5
        with:
          name: windows-zip
          path: MarsFlow-windows.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: sudo apt-get update
      - run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build linux --release
      - run: cd build/linux/x64/release/bundle && zip -r ../../../../../MarsFlow-linux.zip .
      - uses: actions/upload-artifact@v5
        with:
          name: linux-zip
          path: MarsFlow-linux.zip

  release:
    needs: [android, web, macos, windows, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - run: |
          mkdir out
          cp artifacts/android-apk/MarsFlow-android-release.apk out/
          cp artifacts/web-zip/MarsFlow-web.zip out/
          cp artifacts/macos-zip/MarsFlow-macos-app.zip out/
          cp artifacts/windows-zip/MarsFlow-windows.zip out/
          cp artifacts/linux-zip/MarsFlow-linux.zip out/
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" out/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" out/* --title "${GITHUB_REF_NAME}" --notes ""
          fi
